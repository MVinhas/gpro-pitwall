name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Secret scan (must pass before anything else)
        run: bin/check_no_secrets.sh

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, intl, sqlite, apcu, curl
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Validate composer.json
        # No --strict: we intentionally publish a 'version' field for the
        # release pipeline + footer rendering. --strict would treat that
        # as an error since composer prefers VCS-tag versions.
        run: composer validate --no-check-lock

      - name: Install dependencies (with dev)
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Static analysis (PHPStan)
        run: composer analyse

      - name: Code style (PHP_CodeSniffer)
        run: composer lint

      - name: Twig lint
        run: composer twig-lint

      - name: Tests (PHPUnit) with coverage
        run: vendor/bin/phpunit --coverage-text --coverage-clover var/coverage/clover.xml

      - name: Enforce coverage threshold
        # Floor sits just under the measured baseline (46.2% statements,
        # first pcov run 2026-07-04). Ratchet UP as coverage grows — never
        # down.
        run: php bin/check_coverage.php var/coverage/clover.xml 45

      - name: Composer audit (security check)
        run: composer audit --no-interaction

      - name: Ensure .env is not committed
        run: |
          if git ls-files | grep -q "^\.env$"; then
            echo ".env file found in repository. Remove it before merging."
            exit 1
          fi

      - name: Production install (no dev)
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress --no-suggest

  bundle:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, intl, sqlite, apcu, curl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Build release bundle
        run: bin/build_release.sh --tar

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpro-pitwall-bundle
          path: dist/gpro-pitwall.tar.gz
          retention-days: 14

      - name: Annotate bundle contents
        run: |
          echo "### gpro-pitwall build bundle" >> "$GITHUB_STEP_SUMMARY"
          echo "This is a build-verification bundle, not a ready-to-deploy artifact." >> "$GITHUB_STEP_SUMMARY"
          echo "It excludes the private runtime inputs config/secrets.php and data/tracks.csv (both gitignored) — add them locally before any SFTP deploy." >> "$GITHUB_STEP_SUMMARY"
